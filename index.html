<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Match avec ton emploi</title>

<style>
:root{
  --primary:#406BDE;
  --bg:#DBE3FF;
}

*, *::before, *::after {
  box-sizing: border-box;
}

html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}

body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  font-family: "Marianne", Verdana, Tahoma, sans-serif;
  -webkit-tap-highlight-color: transparent;
}

/* ── HEADER ── */
.header-wrap {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 10;
}

.header1 {
  background: #B0BFF0;
  text-align: center;
  padding: 12px 16px;
  font-weight: 700;
  font-size: clamp(16px, 4vw, 22px);
  line-height: 1.2;
}

.header2 {
  background: white;
  text-align: center;
  padding: 10px 16px;
  font-weight: 700;
  color: var(--primary);
  font-size: clamp(13px, 3.5vw, 17px);
  line-height: 1.2;
}

/* ── FILTERS ── */
.filters {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 14px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  flex-shrink: 0;
}
.filters::-webkit-scrollbar { display: none; }

.filters button {
  border: none;
  padding: 7px 14px;
  border-radius: 20px;
  background: white;
  font-weight: bold;
  font-size: clamp(12px, 3.2vw, 14px);
  white-space: nowrap;
  cursor: pointer;
  flex-shrink: 0;
}

.filters .active {
  background: var(--primary);
  color: white;
}

/* ── INTRO TEXT ── */
.intro-text {
  text-align: center;
  padding: 4px 20px 8px;
  font-size: clamp(12px, 3.2vw, 14px);
  color: #2a3a6e;
  font-weight: 500;
  margin: 0;
  flex-shrink: 0;
}

/* ── MAIN LAYOUT ── */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  min-height: 0;
  padding: 0 12px 12px;
}

/* ── STACK ── */
.stack {
  position: relative;
  width: min(95vw, 440px);
  /* Prend le plus d'espace vertical disponible */
  flex: 1;
  min-height: 0;
  max-height: min(72vh, 620px);
}

/* Cartes du dessous – effet paquet */
.stack::before,
.stack::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 22px;
  pointer-events: none;
}

.stack::before {
  transform: rotate(-4deg) translateY(6px);
  z-index: 0;
  background: #8fa6e0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.30);
}

.stack::after {
  transform: rotate(-2deg) translateY(3px);
  z-index: 1;
  background: #b3c3ef;
  box-shadow: 0 10px 24px rgba(0,0,0,0.25);
}

/* ── CARD ── */
.card {
  position: absolute;
  inset: 0;
  border-radius: 22px;
  overflow: hidden;
  background: white;
  box-shadow: 0 12px 30px rgba(0,0,0,0.22);
  touch-action: none;
  z-index: 2;
  cursor: grab;
  user-select: none;
}

.card:active { cursor: grabbing; }

.card img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #fff;
  display: block;
}

.content {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: clamp(14px, 3vw, 22px);
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
}

.content h2 {
  color: white;
  margin: 0 0 4px;
  font-size: clamp(16px, 4.5vw, 22px);
  line-height: 1.2;
}

.content p {
  color: rgba(255,255,255,0.88);
  margin: 0;
  font-size: clamp(12px, 3vw, 15px);
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* ── SWIPE INDICATORS ── */
.card .label-like,
.card .label-nope {
  position: absolute;
  top: 24px;
  font-size: clamp(20px, 6vw, 32px);
  font-weight: 900;
  border: 4px solid;
  border-radius: 8px;
  padding: 4px 10px;
  opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
  letter-spacing: 2px;
}
.card .label-like {
  left: 20px;
  color: #2ecc71;
  border-color: #2ecc71;
  transform: rotate(-15deg);
}
.card .label-nope {
  right: 20px;
  color: #e74c3c;
  border-color: #e74c3c;
  transform: rotate(15deg);
}

/* ── ACTIONS ── */
.actions {
  display: flex;
  gap: 16px;
  flex-shrink: 0;
}

.actions button {
  padding: clamp(12px, 3vw, 15px) clamp(20px, 5vw, 28px);
  border: none;
  border-radius: 50px;
  color: white;
  font-weight: 800;
  font-size: clamp(14px, 3.5vw, 16px);
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.18);
}

.actions button:active {
  transform: scale(0.94);
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}

.nope { background: #e74c3c; }
.like { background: #2ecc71; }

/* ── SPACER (sous header fixe) ── */
.spacer {
  /* Hauteur calculée dynamiquement via JS */
  flex-shrink: 0;
}

/* ===================== */
/* MATCH                 */
/* ===================== */

.match {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: clamp(10px, 2.5vh, 18px);
  z-index: 999;
  padding: 24px 20px;
  overflow: hidden;
}

.match.show { display: flex; }

.match.flash {
  animation: flash 0.6s ease;
}

@keyframes flash {
  0%   { background: #ffffff; }
  50%  { background: #c7d2ff; }
  100% { background: var(--bg); }
}

.handshake {
  font-size: clamp(48px, 12vw, 80px);
  animation: pop 0.6s ease;
  line-height: 1;
}

@keyframes pop {
  0%   { transform: scale(0); }
  70%  { transform: scale(1.3); }
  100% { transform: scale(1); }
}

#matchText {
  font-size: clamp(20px, 5.5vw, 36px);
  font-weight: 800;
  color: #1d1e3c;
  text-align: center;
  margin: 0;
  max-width: 90vw;
  word-break: break-word;
}

.match a {
  width: min(90vw, 300px);
  padding: clamp(12px, 2.5vh, 16px) 18px;
  border-radius: 14px;
  text-decoration: none;
  font-weight: 700;
  display: block;
  text-align: center;
  font-size: clamp(14px, 3.5vw, 16px);
}

.ft-btn,
.company-btn {
  background: #406BDE;
  color: white;
}

.match button {
  padding: clamp(10px, 2vh, 14px) 20px;
  border: none;
  border-radius: 10px;
  background: #6C63FF;
  color: white;
  font-weight: 700;
  cursor: pointer;
  font-size: clamp(14px, 3.5vw, 16px);
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  color: #2a3a6e;
  font-size: clamp(14px, 4vw, 18px);
  font-weight: 600;
  padding: 20px;
}
</style>
</head>

<body>

<div class="header-wrap" id="headerWrap">
  <div class="header1">Match avec ton emploi</div>
  <div class="header2">France Travail X La Route du Rhum</div>
</div>

<div class="spacer" id="spacer"></div>

<div class="filters" id="filters"></div>

<p class="intro-text">Swipe à droite si le métier t'intéresse, à gauche si ce n'est pas pour toi. Un match&nbsp;= une opportunité à saisir&nbsp;!</p>

<div class="screen">
  <div class="stack" id="stack"></div>

  <div class="actions">
    <button class="nope" onclick="forceSwipe('left')">❌ Pas pour moi</button>
    <button class="like"  onclick="forceSwipe('right')">❤️ J'aime</button>
  </div>
</div>

<div class="match" id="match"></div>

<script>
/* ── Ajuste le spacer pour compenser le header fixe ── */
function adjustSpacer(){
  const h = document.getElementById("headerWrap").offsetHeight;
  document.getElementById("spacer").style.height = h + "px";
}
adjustSpacer();
window.addEventListener("resize", adjustSpacer);

/* ── Data ── */
let data = {};
let currentList = [];
let currentIndex = 0;

async function loadData(){
  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSM_YU-q5RRw9vsihxuJaZ-kStFXupQ9bt_dcBXy3-rkIKQj297iAQXyJ_6DcuFkw4XEDRkyZhfEH7a/pub?output=csv");
    const text = await res.text();
    const rows = text.split("\n").slice(1);
    rows.forEach(r => {
      const c = r.split(",");
      if(!c[0]) return;
      if(!data[c[0]]) data[c[0]] = [];
      data[c[0]].push({ name: c[1], desc: c[2], img: c[3], url: c[4] });
    });
    buildFilters();
    setFilter("all");
  } catch(e) {
    document.getElementById("stack").innerHTML = '<p class="empty-state">Impossible de charger les données.</p>';
  }
}

function buildFilters(){
  const container = document.getElementById("filters");
  container.innerHTML = "";

  function setActive(btn){
    document.querySelectorAll(".filters button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  const allBtn = document.createElement("button");
  allBtn.textContent = "Tous";
  allBtn.classList.add("active");
  allBtn.onclick = e => { setFilter("all"); setActive(e.target); };
  container.appendChild(allBtn);

  Object.keys(data).forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat;
    btn.onclick = e => { setFilter(cat); setActive(e.target); };
    container.appendChild(btn);
  });
}

function setFilter(cat){
  currentList = [];
  if(cat === "all"){ Object.values(data).forEach(a => currentList = currentList.concat(a)); }
  else { currentList = data[cat]; }
  currentIndex = 0;
  render();
}

/* ── Render ── */
function render(){
  const stack = document.getElementById("stack");
  stack.innerHTML = "";
  if(currentIndex >= currentList.length){ currentIndex = 0; }
  if(!currentList.length){ stack.innerHTML = '<p class="empty-state">Plus de cartes disponibles.</p>'; return; }

  const c = currentList[currentIndex];
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <img src="${c.img}" alt="${c.name}" loading="lazy">
    <div class="label-like">LIKE</div>
    <div class="label-nope">NOPE</div>
    <div class="content">
      <h2>${c.name}</h2>
      <p>${c.desc}</p>
    </div>`;

  /* ── Drag / swipe ── */
  let startX = 0, startY = 0, dragging = false;
  const labelLike = card.querySelector(".label-like");
  const labelNope = card.querySelector(".label-nope");

  card.addEventListener("pointerdown", e => {
    startX = e.clientX;
    startY = e.clientY;
    dragging = true;
    card.setPointerCapture(e.pointerId);
    card.style.transition = "none";
  });

  card.addEventListener("pointermove", e => {
    if(!dragging) return;
    const diff = e.clientX - startX;
    const rot  = diff / 14;
    card.style.transform = `translateX(${diff}px) rotate(${rot}deg)`;
    /* Indicateurs visuels */
    if(diff > 20){
      labelLike.style.opacity = Math.min((diff - 20) / 80, 1);
      labelNope.style.opacity = 0;
    } else if(diff < -20){
      labelNope.style.opacity = Math.min((-diff - 20) / 80, 1);
      labelLike.style.opacity = 0;
    } else {
      labelLike.style.opacity = 0;
      labelNope.style.opacity = 0;
    }
  });

  card.addEventListener("pointerup", e => {
    if(!dragging) return;
    dragging = false;
    const diff = e.clientX - startX;
    card.style.transition = "0.3s ease";
    labelLike.style.opacity = 0;
    labelNope.style.opacity = 0;
    if(diff > 100)       swipe("right");
    else if(diff < -100) swipe("left");
    else                 card.style.transform = "translateX(0) rotate(0deg)";
  });

  stack.appendChild(card);
}

/* ── Swipe ── */
function swipe(dir){
  const card = document.querySelector(".card");
  if(!card) return;
  const c = currentList[currentIndex];
  card.style.transition = "0.35s ease";
  card.style.transform = dir === "right"
    ? "translateX(120vw) rotate(25deg)"
    : "translateX(-120vw) rotate(-25deg)";
  currentIndex++;
  setTimeout(() => { dir === "right" ? showMatch(c) : render(); }, 350);
}

function showMatch(c){
  try {
    const audio = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-achievement-bell-600.mp3");
    audio.play().catch(()=>{});
  } catch(e){}
  if(navigator.vibrate){ navigator.vibrate([200,100,200]); }

  const m = document.getElementById("match");
  m.innerHTML = `
    <div class="handshake">🤝</div>
    <h1 id="matchText">MATCH avec ${c.name}&nbsp;!</h1>
    <a class="ft-btn"      href="https://recrute.francetravail.fr/page-employeur/" target="_blank">Offres France Travail</a>
    <a class="company-btn" href="${c.url || '#'}" target="_blank">Site de l'entreprise</a>
    <button onclick="restart()">Continuer →</button>`;
  m.classList.add("show", "flash");
  setTimeout(() => m.classList.remove("flash"), 700);
}

function forceSwipe(dir){ swipe(dir); }

function restart(){
  document.getElementById("match").classList.remove("show");
  render();
}

loadData();
</script>
</body>
</html>
