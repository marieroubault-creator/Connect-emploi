<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Match avec ton emploi</title>

<style>
:root{
  --primary:#406BDE;
  --bg:#DBE3FF;
}

*{
  box-sizing:border-box;
  font-family:"Marianne", Verdana, Tahoma, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  touch-action:none;
}

/* 🎈 BULLES */
.bubble{
  position:absolute;
  bottom:-100px;
  border-radius:50%;
  opacity:0.35;
  animation:rise linear infinite;
  z-index:-1;
  pointer-events:none;
}

@keyframes rise{
  0%{transform:translateY(0);}
  100%{transform:translateY(-120vh);}
}

/* HEADER */
.header-wrap{
  position:fixed;
  top:0;left:0;right:0;
  z-index:10;
}

.header1{
  background:#B0BFF0;
  text-align:center;
  padding:14px;
  font-weight:700;
  font-size:22px;
  color:#1D1E3C;
}

.header2{
  background:white;
  text-align:center;
  padding:12px;
  font-weight:700;
  color:var(--primary);
}

.spacer{height:110px;}

/* ===== CATEGORIES ===== */
.filters-wrapper{
  position:relative;
  margin-bottom:10px;
}

.filters{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:15px 20px;
  scroll-behavior:smooth;
}

.filters::-webkit-scrollbar{display:none;}

.filters button{
  border:none;
  padding:10px 16px;
  border-radius:25px;
  background:white;
  font-weight:bold;
  white-space:nowrap;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
  flex-shrink:0;
}

.filters .active{
  background:var(--primary);
  color:white;
}

/* incitation scroll */
.scroll-hint{
  text-align:center;
  font-size:12px;
  opacity:0.6;
  margin-top:-5px;
}

/* SCREEN */
.screen{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* STACK */
.stack{
  width:90vw;
  max-width:420px;
  height:75vh;
  position:relative;
}

/* CARD */
.card{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  touch-action:none;
}

/* IMAGE */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
}

/* TEXT */
.content{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(to top, rgba(0,0,0,0.75), transparent);
}

.content h2,
.content p{
  color:white;
  margin:0;
}

/* BADGES */
.badge{
  position:absolute;
  top:40px;
  font-size:26px;
  font-weight:800;
  padding:8px 14px;
  border-radius:10px;
  display:none;
  z-index:5;
}

.like-indicator{
  left:20px;
  color:#2ecc71;
  border:2px solid #2ecc71;
}

.nope-indicator{
  right:20px;
  color:#e74c3c;
  border:2px solid #e74c3c;
}

/* MATCH CINEMA */
.match{
  display:none;
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top, #1a1a2e, #000);
  color:white;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:20;
  text-align:center;
  padding:20px;
}

.match.show{
  display:flex;
  animation:fadeIn 0.5s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(1.05);}
  to{opacity:1; transform:scale(1);}
}

.match h1{
  font-size:52px;
}

/* boutons match */
.match a{
  margin-top:12px;
  padding:14px 20px;
  width:260px;
  text-align:center;
  background:#406BDE;
  color:white;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
}
</style>
</head>

<body>

<div class="header-wrap">
  <div class="header1">Match avec ton emploi</div>
  <div class="header2">France Travail et la route du Rhum</div>
</div>

<div class="spacer"></div>

<!-- CATEGORIES -->
<div class="filters-wrapper">
  <div class="filters" id="filters">
    <button class="active" onclick="setFilter('all')">Tous</button>
    <button onclick="setFilter('aide')">Aide à la personne</button>
    <button onclick="setFilter('batiment')">Bâtiment</button>
    <button onclick="setFilter('asso')">Collectivités / asso</button>
    <button onclick="setFilter('commerce')">Commerce</button>
    <button onclick="setFilter('gms')">Grande distribution</button>
    <button onclick="setFilter('hcrb')">HCRB</button>
    <button onclick="setFilter('industrie')">Industrie</button>
    <button onclick="setFilter('agri')">Pêche / Agriculture</button>
    <button onclick="setFilter('cyber')">Sécurité informatique</button>
    <button onclick="setFilter('transport')">Transport</button>
    <button onclick="setFilter('interim')">Intérim</button>
    <button onclick="setFilter('autre')">Autre</button>
  </div>
</div>

<div class="scroll-hint">👉 Glisse pour voir toutes les catégories</div>

<div class="screen">
  <div class="stack" id="stack"></div>
</div>

<div class="match" id="match">
  <h1 id="matchText">MATCH !</h1>
  <a href="https://recrute.francetravail.fr/page-employeur/" target="_blank">
    France Travail
  </a>
  <a id="companyLink" href="#" target="_blank">
    Entreprise
  </a>
  <button onclick="restart()" style="margin-top:15px;padding:10px 16px;border:none;border-radius:10px;">
    Retour
  </button>
</div>

<script>

/* BULLES */
for(let i=0;i<20;i++){
  const b=document.createElement("div");
  b.className="bubble";
  const s=10+Math.random()*60;
  b.style.width=s+"px";
  b.style.height=s+"px";
  b.style.left=Math.random()*100+"vw";
  document.body.appendChild(b);
}

/* DATA */
const companies=[
  {name:"Mytilimer",desc:"Industrie maritime",img:"img/mytilimer.jpg",tag:"industrie",url:"#"},
  {name:"Bâtiment Pro",desc:"Construction",img:"img/bat.jpg",tag:"batiment",url:"#"},
  {name:"Maison Service",desc:"Aide à domicile",img:"img/aide.jpg",tag:"aide",url:"#"}
];

let filter="all";
const stack=document.getElementById("stack");

function vibrate(i=1){
  if(navigator.vibrate) navigator.vibrate(10*i);
}

/* SWIPE PRO */
function render(){
  stack.innerHTML="";

  const list=companies.filter(c=>filter==="all"||c.tag===filter);

  list.slice(0,4).forEach((c,i)=>{

    const card=document.createElement("div");
    card.className="card";

    let startX=0;
    let dragging=false;

    const like=document.createElement("div");
    like.className="badge like-indicator";
    like.textContent="AIME";

    const nope=document.createElement("div");
    nope.className="badge nope-indicator";
    nope.textContent="PAS POUR MOI";

    card.appendChild(like);
    card.appendChild(nope);

    card.innerHTML+=`
      <img src="${c.img}">
      <div class="content">
        <h2>${c.name}</h2>
        <p>${c.desc}</p>
      </div>
    `;

    card.style.transform=`scale(${1-i*0.06}) translateY(${i*12}px)`;

    card.addEventListener("pointerdown",e=>{
      startX=e.clientX;
      dragging=true;
    });

    card.addEventListener("pointermove",e=>{
      if(!dragging) return;

      let x=e.clientX-startX;

      card.style.transform=`translateX(${x}px) rotate(${x/20}deg)`;

      if(x>60){
        like.style.display="block";
        nope.style.display="none";
      }else if(x<-60){
        nope.style.display="block";
        like.style.display="none";
      }else{
        like.style.display="none";
        nope.style.display="none";
      }

      vibrate(Math.min(3,Math.abs(x)/80));
    });

    card.addEventListener("pointerup",e=>{
      dragging=false;

      let diff=e.clientX-startX;

      if(diff>120) swipe(card,true,c);
      else if(diff<-120) swipe(card,false,c);
      else{
        card.style.transition="0.3s";
        card.style.transform="translateX(0)";
        like.style.display=nope.style.display="none";
      }
    });

    stack.appendChild(card);
  });
}

/* SWIPE OUT */
function swipe(card,like,c){

  card.style.transition="0.4s ease";
  card.style.transform=like
    ?"translateX(1200px) rotate(30deg)"
    :"translateX(-1200px) rotate(-30deg)";

  vibrate(10);

  setTimeout(()=>showMatch(c),300);
}

/* MATCH */
function showMatch(c){
  const m=document.getElementById("match");
  m.classList.add("show");

  document.getElementById("matchText").textContent="MATCH ! "+c.name;
  document.getElementById("companyLink").href=c.url;
}

/* RESET */
function restart(){
  document.getElementById("match").classList.remove("show");
  render();
}

/* FILTER */
function setFilter(f){
  filter=f;
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

render();
</script>

</body>
</html>
