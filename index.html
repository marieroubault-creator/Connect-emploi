<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Match avec ton emploi</title>

<style>
:root{
  --text-primary:#1D1E3C;
  --text-secondary:#283276;
  --primary:#406BDE;
  --bg:#DBE3FF;
}

*{
  box-sizing:border-box;
  font-family:"Marianne", Verdana, Tahoma, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  touch-action:none; /* 🔥 CRUCIAL TABLETTE */
}

/* HEADER */
.header-wrap{
  position:fixed;
  top:0;left:0;right:0;
  z-index:10;
}

.header1{
  background:#B0BFF0;
  color:#1D1E3C;
  text-align:center;
  padding:12px;
  font-weight:700;
  font-size:22px;
}

.header2{
  background:white;
  color:var(--primary);
  text-align:center;
  padding:10px;
  font-weight:700;
}

.spacer{height:90px;}

.filters{
  display:flex;
  gap:10px;
  justify-content:center;
  padding:10px;
}

.filters button{
  border:none;
  padding:10px 14px;
  border-radius:20px;
  background:white;
  font-weight:bold;
}

.filters .active{
  background:var(--primary);
  color:white;
}

.screen{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

.stack{
  position:relative;
  width:320px;
  height:520px;
}

.card{
  position:absolute;
  width:100%;
  height:100%;
  background:white;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  overflow:hidden;
  touch-action:none;
}

.card img{
  width:100%;
  height:70%;
  object-fit:cover;
}

.content{padding:15px;}

.match{
  display:none;
  text-align:center;
  padding:40px;
}

.match h1{
  font-size:38px;
  font-weight:800;
}

.match a{
  display:inline-block;
  margin-top:10px;
  padding:12px 20px;
  background:var(--primary);
  color:white;
  border-radius:10px;
}

.footer{
  background:white;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:var(--primary);
}
</style>
</head>

<body>

<div class="header-wrap">
  <div class="header1">Match avec ton emploi</div>
  <div class="header2">France Travail et la route du Rhum</div>
</div>

<div class="spacer"></div>

<div class="filters">
  <button class="active" onclick="setFilter('all')">Tous</button>
  <button onclick="setFilter('restauration')">Restauration</button>
  <button onclick="setFilter('industrie')">Industrie</button>
  <button onclick="setFilter('alternance')">Alternance</button>
</div>

<div class="screen">
  <div class="stack" id="stack"></div>
</div>

<div class="match" id="match">
  <div style="font-size:60px">🤝</div>
  <h1 id="matchText"></h1>

  <a href="https://candidat.francetravail.fr/" target="_blank">
    Se connecter à France Travail
  </a><br>

  <a id="companyLink" href="#" target="_blank">
    Voir le site entreprise
  </a><br><br>

  <button onclick="restart()">Retour</button>
</div>

<div class="footer">
France Travail 2026 | Dites-le nous une fois
</div>

<script>
const companies=[
  {name:"Mytilimer",desc:"Industrie maritime",img:"img/mytilimer.jpg",tag:"industrie",url:"https://www.mytilimer.fr"},
  {name:"Biscuits Joyeux",desc:"Biscuiterie artisanale",img:"img/biscuits.jpg",tag:"restauration",url:"https://www.biscuits-joyeux.fr"},
  {name:"Alternance Pro",desc:"Centre de formation",img:"img/alt.jpg",tag:"alternance",url:"https://www.alternance-pro.fr"}
];

let filter="all";
const stack=document.getElementById("stack");

function render(){
  const list=companies.filter(c=>filter==="all"||c.tag===filter);
  stack.innerHTML="";

  list.slice(0,4).reverse().forEach((c,i)=>{

    const card=document.createElement("div");
    card.className="card";
    card.style.zIndex=10-i;

    // profondeur
    card.style.transform=`scale(${1-i*0.05}) translateY(${i*10}px)`;
    card.style.filter=`blur(${i*1.5}px)`;
    card.style.opacity=1-i*0.1;

    card.innerHTML=`
      <img src="${c.img}" onerror="this.src='https://via.placeholder.com/400x500'">
      <div class="content">
        <h2>${c.name}</h2>
        <p>${c.desc}</p>
      </div>
    `;

    let startX=0, currentX=0, velocity=0, lastX=0, lastT=0, dragging=false;

    card.addEventListener("pointerdown",e=>{
      startX=e.clientX;
      lastX=startX;
      lastT=Date.now();
      dragging=true;
      card.setPointerCapture(e.pointerId);
    });

    card.addEventListener("pointermove",e=>{
      if(!dragging) return;
      e.preventDefault();

      currentX=e.clientX-startX;

      let now=Date.now();
      velocity=(e.clientX-lastX)/(now-lastT);
      lastX=e.clientX;
      lastT=now;

      card.style.transform=`translateX(${currentX}px) rotate(${currentX/18}deg)`;
    });

    const end=()=>{
      if(!dragging) return;
      dragging=false;

      let finalX=currentX + velocity*150;

      if(finalX>120){
        card.style.transform="translateX(800px) rotate(30deg)";
        setTimeout(()=>showMatch(c),200);
      }
      else if(finalX<-120){
        card.style.transform="translateX(-800px) rotate(-30deg)";
        setTimeout(()=>{
          companies.push(companies.shift());
          render();
        },200);
      }
      else{
        card.style.transition="transform 0.3s";
        card.style.transform="translateX(0)";
        setTimeout(()=>card.style.transition="",300);
      }

      currentX=0;
    };

    card.addEventListener("pointerup",end);
    card.addEventListener("pointercancel",end);

    stack.appendChild(card);
  });
}

function showMatch(c){
  document.querySelector(".screen").style.display="none";
  document.querySelector(".filters").style.display="none";
  document.getElementById("match").style.display="block";

  document.getElementById("matchText").textContent="Match avec "+c.name;
  document.getElementById("companyLink").href=c.url;
}

function restart(){
  document.getElementById("match").style.display="none";
  document.querySelector(".screen").style.display="flex";
  document.querySelector(".filters").style.display="flex";
  render();
}

function setFilter(f){
  filter=f;
  document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

render();
</script>

</body>
</html>
