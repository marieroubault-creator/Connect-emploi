<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Match avec ton emploi</title>

<style>
:root{
  --primary:#406BDE;
  --bg:#DBE3FF;
}

*{
  box-sizing:border-box;
  font-family:"Marianne", Verdana, Tahoma, sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header-wrap{
  position:fixed;
  top:0;left:0;right:0;
  z-index:10;
}

.header1{
  background:#B0BFF0;
  text-align:center;
  padding:14px;
  font-weight:700;
  font-size:22px;
}

.header2{
  background:white;
  text-align:center;
  padding:12px;
  font-weight:700;
  color:var(--primary);
}

.spacer{height:110px;}

/* FILTERS */
.filters{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 20px;
}

.filters button{
  border:none;
  padding:8px 14px;
  border-radius:20px;
  background:white;
  font-weight:bold;
}

.filters .active{
  background:var(--primary);
  color:white;
}

/* MAIN */
.screen{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* CARD STACK */
.stack{
  width:300px;
  height:420px;
  position:relative;
}

.card{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* IMAGE */
.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY */
.content{
  position:absolute;
  bottom:0;
  width:100%;
  padding:20px;
  background:linear-gradient(to top, rgba(0,0,0,0.85), transparent);
}

.content h2,
.content p{
  color:white;
  margin:0;
}

/* BUTTONS */
.actions{
  margin-top:20px;
  display:flex;
  gap:20px;
}

.actions button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.nope{background:#e74c3c;}
.like{background:#2ecc71;}

/* MATCH */
.match{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.match.show{display:flex;}
</style>
</head>

<body>

<div class="header-wrap">
  <div class="header1">Match avec ton emploi</div>
  <div class="header2">France Travail</div>
</div>

<div class="spacer"></div>

<div class="filters" id="filters"></div>

<div class="screen">
  <div class="stack" id="stack"></div>

  <!-- BOUTONS -->
  <div class="actions">
    <button class="nope" onclick="forceSwipe('left')">❌ Pas pour moi</button>
    <button class="like" onclick="forceSwipe('right')">❤️ J'aime</button>
  </div>
</div>

<div class="match" id="match">
  <h1 id="matchText"></h1>
  <button onclick="restart()">Continuer</button>
</div>

<script>

let data = {};
let currentList = [];
let currentIndex = 0;

/* LOAD DATA */
async function loadData(){
  const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSM_YU-q5RRw9vsihxuJaZ-kStFXupQ9bt_dcBXy3-rkIKQj297iAQXyJ_6DcuFkw4XEDRkyZhfEH7a/pub?output=csv");
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  rows.forEach(r=>{
    const c = r.split(",");
    if(!c[0]) return;

    if(!data[c[0]]) data[c[0]]=[];

    data[c[0]].push({
      name:c[1],
      desc:c[2],
      img:c[3],
      url:c[4]
    });
  });

  buildFilters();
  setFilter("all");
}

/* FILTERS */
function buildFilters(){
  const f = document.getElementById("filters");

  f.innerHTML = `<button onclick="setFilter('all')">Tous</button>`;

  Object.keys(data).forEach(cat=>{
    const b=document.createElement("button");
    b.textContent=cat;
    b.onclick=()=>setFilter(cat);
    f.appendChild(b);
  });
}

/* SET FILTER */
function setFilter(cat){
  currentList = [];

  if(cat==="all"){
    Object.values(data).forEach(a=>currentList=currentList.concat(a));
  }else{
    currentList=data[cat];
  }

  currentIndex=0;
  render();
}

/* RENDER */
function render(){
  const stack=document.getElementById("stack");
  stack.innerHTML="";

  if(currentIndex>=currentList.length){
    stack.innerHTML="<p>Plus de cartes</p>";
    return;
  }

  const c=currentList[currentIndex];

  const card=document.createElement("div");
  card.className="card";

  card.innerHTML=`
    <img src="${c.img}">
    <div class="content">
      <h2>${c.name}</h2>
      <p>${c.desc}</p>
    </div>
  `;

  stack.appendChild(card);
}

/* SWIPE */
function swipe(dir){
  const card=document.querySelector(".card");
  if(!card) return;

  card.style.transform = dir==="right"
    ? "translateX(500px)"
    : "translateX(-500px)";

  const c=currentList[currentIndex];

  currentIndex++;

  setTimeout(()=>{
    if(dir==="right") alertMatch(c);
    else render();
  },300);
}

/* BUTTONS */
function forceSwipe(dir){
  swipe(dir);
}

/* MATCH */
function alertMatch(c){
  const m=document.getElementById("match");
  m.classList.add("show");
  document.getElementById("matchText").textContent="MATCH avec "+c.name;
}

/* RESET */
function restart(){
  document.getElementById("match").classList.remove("show");
  render();
}

loadData();

</script>
</body>
</html>
